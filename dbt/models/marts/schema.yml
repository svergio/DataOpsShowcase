version: 2

models:
  - name: dim_customers
    description: "Customer dimension with BDV-derived segment, sourced from sat_customer_business."
    config:
      tags: ['marts', 'dim']
    tests:
      - dqc_min_row_count:
          min_count: 1
    columns:
      - name: customer_hub_key
        tests: [not_null, unique]
      - name: customer_bk
        tests: [not_null]
      - name: customer_hash
      - name: masked_email
      - name: masked_name
      - name: customer_segment
        tests:
          - accepted_values:
              values: ['platinum', 'gold', 'silver', 'bronze']
              config:
                where: "customer_segment is not null"
      - name: bdv_load_dts
      - name: mart_load_dts
        tests: [not_null]

  - name: dim_products
    description: "Product dimension with current attributes from sat_product_attributes."
    config:
      tags: ['marts', 'dim']
    columns:
      - name: product_hub_key
        tests: [not_null, unique]
      - name: product_bk
        tests: [not_null]
      - name: sku
      - name: product_name
      - name: category
      - name: price
      - name: is_active

  - name: fct_orders
    description: "Order fact built on bridge_customer_order + sat_order_enriched."
    config:
      tags: ['marts', 'fact']
    tests:
      - dqc_min_row_count:
          min_count: 1
    columns:
      - name: order_hub_key
        tests: [not_null, unique]
      - name: order_bk
        tests: [not_null]
      - name: customer_hub_key
        tests:
          - relationships:
              to: ref('dim_customers')
              field: customer_hub_key
              config:
                where: "customer_hub_key is not null"
      - name: status
      - name: total_amount
        tests:
          - dqc_non_negative_column: {}
      - name: currency
      - name: order_ts
      - name: order_date
      - name: payment_state
        tests:
          - accepted_values:
              values: ['fully_paid', 'partially_paid', 'unpaid']
              config:
                where: "payment_state is not null"

  - name: fct_payments
    description: "Payment fact joined to link_order_payment for order_hub_key."
    config:
      tags: ['marts', 'fact']
    columns:
      - name: payment_hub_key
        tests: [not_null, unique]
      - name: payment_bk
        tests: [not_null]
      - name: order_hub_key
        tests:
          - relationships:
              to: ref('fct_orders')
              field: order_hub_key
              config:
                where: "order_hub_key is not null"
      - name: amount
        tests:
          - dqc_non_negative_column: {}
      - name: status
      - name: payment_method
      - name: payment_ts
      - name: payment_date

  - name: fct_daily_sales
    description: "Daily sales aggregation per currency."
    config:
      tags: ['marts', 'fact', 'daily']
    tests:
      - dqc_min_row_count:
          min_count: 1
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ['order_date', 'currency']
    columns:
      - name: order_date
        tests: [not_null]
      - name: currency
        tests: [not_null]
      - name: order_count
        tests:
          - not_null
          - dqc_non_negative_column: {}
      - name: gross_sales
        tests:
          - not_null
          - dqc_non_negative_column: {}

  - name: mart_daily_business_kpis
    description: "Daily top-line KPI mart: GMV, net revenue, orders, AOV, buyers and new/repeat split."
    config:
      tags: ['marts', 'business_kpis']
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ['metric_date', 'currency']
    columns:
      - name: metric_date
        tests: [not_null]
      - name: currency
        tests: [not_null]
      - name: orders_count
        tests: [not_null]
      - name: buyers_count
        tests: [not_null]
      - name: gmv
        tests:
          - not_null
          - dqc_non_negative_column: {}
      - name: net_revenue
        tests:
          - not_null
          - dqc_non_negative_column: {}

  - name: mart_cohort_retention
    description: "Retention mart by first-order cohort month and activity date."
    config:
      tags: ['marts', 'business_kpis']
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ['cohort_month', 'activity_date']
    columns:
      - name: cohort_month
        tests: [not_null]
      - name: activity_date
        tests: [not_null]
      - name: days_since_first_order
        tests: [not_null]
      - name: active_users
        tests: [not_null]
      - name: cohort_size
        tests: [not_null]

  - name: mart_user_rfm
    description: "Customer-level frequency and LTV windows (30/90/180/365 days)."
    config:
      tags: ['marts', 'business_kpis']
    columns:
      - name: customer_hub_key
        tests: [not_null, unique]
      - name: first_order_date
        tests: [not_null]
      - name: last_order_date
        tests: [not_null]
      - name: orders_total
        tests: [not_null]
      - name: revenue_total
        tests:
          - not_null
          - dqc_non_negative_column: {}

  - name: mart_category_performance
    description: "Category and seller daily performance from order-product bridge."
    config:
      tags: ['marts', 'business_kpis']
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ['metric_date', 'category', 'seller_bk']
    columns:
      - name: metric_date
        tests: [not_null]
      - name: category
        tests: [not_null]
      - name: seller_bk
        tests: [not_null]
      - name: gross_revenue
        tests:
          - not_null
          - dqc_non_negative_column: {}

  - name: mart_marketing_channel
    description: "Channel-level campaign budget mart (attribution-ready structure with placeholder KPIs)."
    config:
      tags: ['marts', 'business_kpis']
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ['metric_date', 'channel']
    columns:
      - name: metric_date
        tests: [not_null]
      - name: channel
        tests: [not_null]
      - name: campaigns_count
        tests: [not_null]
      - name: planned_budget
        tests:
          - not_null
          - dqc_non_negative_column: {}

  - name: mart_unit_economics
    description: "Cohort-level LTV rollup with explicit placeholders for CAC/ROAS-dependent metrics."
    config:
      tags: ['marts', 'business_kpis']
    columns:
      - name: cohort_month
        tests: [not_null, unique]
      - name: customers_count
        tests: [not_null]
      - name: avg_ltv_30d
      - name: avg_ltv_90d
      - name: avg_ltv_180d
      - name: avg_ltv_365d
      - name: limitations_note

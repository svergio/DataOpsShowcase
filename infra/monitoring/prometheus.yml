global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/atlas.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: airflow_webserver
    metrics_path: /health
    static_configs:
      - targets: ["airflow_webserver:8080"]

  - job_name: spark_master
    static_configs:
      - targets: ["spark_master:8080"]

  - job_name: spark_worker
    static_configs:
      - targets: ["spark_worker:8081"]

  - job_name: redis_exporter
    static_configs:
      - targets: ["redis_exporter:9121"]

  - job_name: kafka_exporter
    static_configs:
      - targets: ["kafka_exporter:9308"]

  - job_name: schema_registry
    static_configs:
      - targets: ["schema_registry:8081"]

  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ["minio:9000"]

  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]

  - job_name: cadvisor
    scrape_interval: 20s
    static_configs:
      - targets: ["cadvisor:8080"]

  # NL2SQL app listens on container port 8060 (not 8000). Scrape path /metrics.
  - job_name: nl2sql_app
    metrics_path: /metrics
    static_configs:
      - targets: ["nl2sql_app:8060"]

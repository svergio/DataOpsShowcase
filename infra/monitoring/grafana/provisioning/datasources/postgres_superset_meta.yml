apiVersion: 1

datasources:
  - name: PostgreSQL Superset Meta
    uid: PGSUP
    type: postgres
    access: proxy
    url: postgres_metadb:5432
    database: superset
    user: meta_user
    isDefault: false
    editable: true
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    secureJsonData:
      password: meta_pass

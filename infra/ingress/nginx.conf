events {}

http {
  resolver 127.0.0.11 valid=5s ipv6=off;

  server {
    listen 80;
    server_name _;

    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    location = / {
      set $portal_web_host portal_web;
      proxy_pass http://$portal_web_host:8050;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /static/ {
      set $portal_web_host portal_web;
      proxy_pass http://$portal_web_host:8050;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/status {
      set $portal_web_host portal_web;
      proxy_pass http://$portal_web_host:8050;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /dbt-web {
      rewrite ^/dbt-web/?(.*)$ /dbt/$1 permanent;
    }

    location = /dbt {
      return 301 /dbt/;
    }

    location /dbt/ {
      root /var/www;
      try_files $uri $uri/ /dbt/index.html;
      gzip off;
      sub_filter_once off;
      sub_filter_types application/javascript;
      sub_filter 't.otherwise("/overview")' 't.otherwise("/dbt/overview")';
      sub_filter 'e.state("dbt",{url:"/",abstract:!0' 'e.state("dbt",{url:"/dbt/",abstract:!0';
      sub_filter '"/docs/' '"/dbt/docs/';
      sub_filter '"/components/' '"/dbt/components/';
      sub_filter '"/graph/' '"/dbt/graph/';
      sub_filter '"/main/' '"/dbt/main/';
      sub_filter '"/sources/' '"/dbt/sources/';
      sub_filter '"/overview/overview.html"' '"/dbt/overview/overview.html"';
      sub_filter 'href="/overview/"' 'href="/dbt/overview/"';
      sub_filter '"/overview/"' '"/dbt/overview/"';
      sub_filter '"/overview"' '"/dbt/overview"';
    }

    location ^~ /airflow/api/ {
      set $airflow_web_upstream airflow_webserver:8080;
      proxy_pass http://$airflow_web_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Authorization $http_authorization;
      proxy_set_header Cookie $http_cookie;
    }

    location /airflow/ {
      set $airflow_web_upstream airflow_webserver:8080;
      proxy_pass http://$airflow_web_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Authorization $http_authorization;
      proxy_set_header Cookie $http_cookie;
    }

    location /mlflow/ {
      set $mlflow_host mlflow;
      proxy_pass http://$mlflow_host:5000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /grafana/ {
      set $grafana_host grafana;
      proxy_pass http://$grafana_host:3000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /superset {
      return 301 /superset/;
    }

    location /superset/superset/ {
      rewrite ^/superset/superset/(.*)$ /superset/$1 permanent;
    }

    location /superset/ {
      set $superset_upstream superset;
      rewrite ^/superset/(.*)$ /superset/$1 break;
      proxy_pass http://$superset_upstream:8088;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Prefix /superset;
      proxy_set_header X-Script-Name /superset;
    }

    location /jupyter/ {
      set $jupyter_host jupyterhub;
      rewrite ^/jupyter/(.*)$ /jupyter/$1 break;
      proxy_pass http://$jupyter_host:8888;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    location = /node-red {
      return 301 /node-red/;
    }

    location /node-red/ {
      set $node_red_host node_red;
      rewrite ^/node-red/(.*)$ /node-red/$1 break;
      proxy_pass http://$node_red_host:1880;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    location = /nl2sql {
      return 301 /nl2sql/;
    }

    # Strip /nl2sql/ prefix; upstream is nl2sql_app:8060.
    # set must run before rewrite ... break or $nl2sql_host can be empty (nginx "no host in upstream").
    location /nl2sql/ {
      set $nl2sql_host nl2sql_app;
      rewrite ^/nl2sql/?(.*)$ /$1 break;
      proxy_pass http://$nl2sql_host:8060;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /prometheus/ {
      set $prometheus_host prometheus;
      rewrite ^/prometheus/?(.*)$ /$1 break;
      proxy_pass http://$prometheus_host:9090;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_redirect ~^/(.*)$ /prometheus/$1;
    }

    location /pushgateway/ {
      set $pushgateway_host pushgateway;
      rewrite ^/pushgateway/?(.*)$ /$1 break;
      proxy_pass http://$pushgateway_host:9091;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /spark-master/ {
      set $spark_master_host spark_master;
      rewrite ^/spark-master/?(.*)$ /$1 break;
      proxy_pass http://$spark_master_host:8080;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /spark-worker/ {
      set $spark_worker_host spark_worker;
      rewrite ^/spark-worker/?(.*)$ /$1 break;
      proxy_pass http://$spark_worker_host:8081;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /minio-console/ {
      set $minio_host minio;
      rewrite ^/minio-console/?(.*)$ /$1 break;
      proxy_pass http://$minio_host:9001;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
    }

    location /atlas/ {
      set $atlas_host atlas_server;
      rewrite ^/atlas/?(.*)$ /$1 break;
      proxy_pass http://$atlas_host:21000;
      proxy_http_version 1.1;
      proxy_set_header Host $host:$server_port;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host:$server_port;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Forwarded-Prefix /atlas;
      proxy_redirect ~^http://[^/]+/(.*)$ /atlas/$1;
      proxy_redirect ~^/(.*)$ /atlas/$1;
      proxy_cookie_path / /atlas/;
    }

    location /schema-registry/ {
      set $schema_registry_host schema_registry;
      rewrite ^/schema-registry/?(.*)$ /$1 break;
      proxy_pass http://$schema_registry_host:8081;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_redirect off;
    }

    location /kafka-connect/ {
      set $debezium_connect_host debezium_connect;
      rewrite ^/kafka-connect/?(.*)$ /$1 break;
      proxy_pass http://$debezium_connect_host:8083;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_redirect off;
    }
  }
}

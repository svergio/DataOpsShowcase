{% extends "base.html" %}
{% block title %}Artifacts | dbt-web{% endblock %}
{% block body %}
<main>
  <h1 class="page-title">Artifacts</h1>
  <p class="page-lead">Fetch stored JSON for a run by <span class="mono">run_id</span>.</p>
  <div class="card">
    <div class="toolbar">
      <input class="input mono" type="text" id="a-run" placeholder="run_id" size="36" style="min-width: 240px">
      <select class="select" id="a-name">
        <option value="manifest.json">manifest.json</option>
        <option value="catalog.json">catalog.json</option>
        <option value="run_results.json">run_results.json</option>
        <option value="graph.js">graph.js</option>
      </select>
      <button type="button" class="btn" id="a-go">Fetch</button>
      <span class="muted" id="a-meta" style="align-self: center; margin-left: auto">—</span>
    </div>
    <p id="a-error" class="err"></p>
    <p id="a-loading" class="muted" style="display: none">Loading…</p>
    <pre class="raw" id="a-out"></pre>
  </div>
</main>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/artifacts.js') }}"></script>
{% endblock %}

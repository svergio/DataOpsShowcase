{% extends "base.html" %}
{% block title %}Runs | dbt-web{% endblock %}
{% block body %}
<main>
  <h1 class="page-title">Runs history</h1>
  <p class="page-lead">Recent dbt run metadata from storage.</p>
  <div class="card">
    <div class="toolbar" id="runs-filters">
      <label>Target
        <select class="select" id="runs-target">
          <option value="">all</option>
          <option value="staging">staging</option>
          <option value="vault">vault</option>
          <option value="marts">marts</option>
        </select>
      </label>
      <label>Status
        <select class="select" id="runs-status">
          <option value="">all</option>
          <option value="success">success</option>
          <option value="failed">failed</option>
          <option value="unknown">unknown</option>
        </select>
      </label>
      <span class="muted" id="runs-totals" style="align-self: center; margin-left: auto">—</span>
    </div>
    <p id="runs-error" class="err"></p>
    <p id="runs-loading" class="muted" style="display: none">Loading…</p>
    <div class="table-wrap">
      <table class="data">
        <thead>
          <tr>
            <th>Target</th>
            <th>Run ID</th>
            <th>Status</th>
            <th>Generated</th>
            <th>dbt</th>
            <th>Elapsed (s)</th>
            <th>Total</th>
            <th>Passed</th>
            <th>Failed</th>
          </tr>
        </thead>
        <tbody id="runs-body"></tbody>
      </table>
    </div>
  </div>
</main>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/runs.js') }}"></script>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}dbt-web{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  {% block extra_css %}{% endblock %}
</head>
<body>
  <div class="shell">
    <header class="shell-header">
      <div class="shell-header-inner">
        <h1 class="app-title">dbt-web</h1>
        <form class="shell-logout" method="post" action="{{ url_for('ui.logout') }}">
          <button type="submit" class="btn-ghost">Log out</button>
        </form>
      </div>
      <nav class="nav-tabs" aria-label="Main">
        <a href="{{ url_for('ui.runs') }}" class="{% if active == 'runs' %}active{% endif %}">Runs</a>
        <a href="{{ url_for('ui.models') }}" class="{% if active == 'models' %}active{% endif %}">Models</a>
        <a href="{{ url_for('ui.lineage') }}" class="{% if active == 'lineage' %}active{% endif %}">Lineage</a>
        <a href="{{ url_for('ui.tests') }}" class="{% if active == 'tests' %}active{% endif %}">Tests</a>
        <a href="{{ url_for('ui.docs') }}" class="{% if active == 'docs' %}active{% endif %}">Docs</a>
        <a href="{{ url_for('ui.artifacts') }}" class="{% if active == 'artifacts' %}active{% endif %}">Artifacts</a>
        <a href="/dbt-api/v1/docs/manifest" target="_blank" rel="noreferrer" class="nav-external">DBT Docs JSON</a>
      </nav>
    </header>
    {% block body %}{% endblock %}
  </div>
  <script>window.DBT_API_BASE = "/api/v1";</script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>

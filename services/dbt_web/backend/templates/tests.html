{% extends "base.html" %}
{% block title %}Tests | dbt-web{% endblock %}
{% block body %}
<main>
  <h1 class="page-title">Tests dashboard</h1>
  <p class="page-lead">Last known failed tests from run results.</p>
  <div class="card">
    <div class="toolbar" id="tests-filters">
      <label>Target
        <select class="select" id="t-target">
          <option value="">all</option>
          <option value="staging">staging</option>
          <option value="vault">vault</option>
          <option value="marts">marts</option>
        </select>
      </label>
      <label>Severity
        <select class="select" id="t-sev">
          <option value="">all</option>
          <option value="error">error</option>
          <option value="warn">warn</option>
        </select>
      </label>
      <span class="muted" id="t-total" style="align-self: center; margin-left: auto">failed_total=0</span>
    </div>
    <p id="tests-error" class="err"></p>
    <p id="tests-loading" class="muted">Loading…</p>
    <div class="panels" id="t-panels"></div>
    <h2 class="page-title" style="margin-top: 20px; font-size: 1.05rem">Failed tests</h2>
    <div class="table-wrap" style="margin-top: 12px">
      <table class="data">
        <thead>
          <tr>
            <th>Target</th>
            <th>Test</th>
            <th>Status</th>
            <th>Severity</th>
            <th>Time (s)</th>
            <th>Message</th>
          </tr>
        </thead>
        <tbody id="t-body"></tbody>
      </table>
    </div>
  </div>
</main>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/tests.js') }}"></script>
{% endblock %}

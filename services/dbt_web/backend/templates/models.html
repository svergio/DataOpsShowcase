{% extends "base.html" %}
{% block title %}Models | dbt-web{% endblock %}
{% block body %}
<main>
  <h1 class="page-title">Models explorer</h1>
  <p class="page-lead">Filter manifest nodes by name, tags, and metadata.</p>
  <div class="card">
    <div class="toolbar" id="models-filters">
      <input class="input" type="search" id="m-query" placeholder="Search by name" size="20">
      <input class="input" type="text" id="m-tags" placeholder="Tags (csv)" size="12">
      <input class="input" type="text" id="m-rt" placeholder="resource_type" size="12">
      <input class="input" type="text" id="m-schema" placeholder="schema" size="12">
      <input class="input" type="text" id="m-pkg" placeholder="package_name" size="14">
      <span class="muted" id="models-count" style="align-self: center; margin-left: auto">0 items</span>
    </div>
    <p id="models-error" class="err"></p>
    <p id="models-loading" class="muted" style="display: none">Loading…</p>
    <p class="muted" id="models-rts"></p>
    <div class="table-wrap">
      <table class="data">
        <thead>
          <tr>
            <th>Unique ID</th>
            <th>Name</th>
            <th>Type</th>
            <th>Schema</th>
            <th>Package</th>
            <th>Tags</th>
            <th>Depends on</th>
          </tr>
        </thead>
        <tbody id="models-body"></tbody>
      </table>
    </div>
  </div>
</main>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/models.js') }}"></script>
{% endblock %}

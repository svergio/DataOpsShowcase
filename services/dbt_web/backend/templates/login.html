<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>dbt-web login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <h1>dbt-web</h1>
      <p class="lead">Local sandbox login for the stand.</p>
      <form method="post" action="{{ url_for('ui.login') }}">
        <input type="hidden" name="next" value="{{ next|e }}">
        <label>Username
          <input class="input" name="username" type="text" autocomplete="username" required>
        </label>
        <label>Password
          <input class="input" name="password" type="password" autocomplete="current-password" required>
        </label>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px">Sign in</button>
      </form>
      {% if error %}
      <p class="err" style="margin-top: 12px; margin-bottom: 0">{{ error }}</p>
      {% endif %}
      <p class="hint">Default: admin / admin (override via env).</p>
    </div>
  </div>
</body>
</html>

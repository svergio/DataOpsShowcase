name: dbt-web

on:
  push:
    branches: [main]
    paths:
      - "services/dbt_web/**"
      - ".github/workflows/dbt-web.yml"
  pull_request:
    paths:
      - "services/dbt_web/**"
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/dbt_web/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev] || pip install fastapi uvicorn pydantic pytest httpx prometheus-client minio boto3
      - name: Lint
        run: |
          pip install ruff || true
          ruff check app || true
      - name: Tests
        env:
          DBT_WEB_DISABLE_BACKGROUND: "1"
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/dbt_web/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm ci || npm install
      - name: Typecheck
        run: npm run typecheck --if-present
      - name: Build
        run: npm run build

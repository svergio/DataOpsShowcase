name: dbt-web

on:
  push:
    branches: [main]
    paths:
      - "services/dbt_web/**"
      - ".github/workflows/dbt-web.yml"
  pull_request:
    paths:
      - "services/dbt_web/**"
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/dbt_web/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint
        run: |
          pip install ruff || true
          ruff check app || true
      - name: Tests
        run: pytest -q

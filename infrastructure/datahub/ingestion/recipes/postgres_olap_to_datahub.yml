source:
  type: postgres
  config:
    host_port: postgres_olap:5432
    database: ${PG_OLAP_DB}
    username: ${PG_OLAP_USER}
    password: ${PG_OLAP_PASSWORD}
    include_tables: true
    include_views: true
    schema_pattern:
      allow:
        - "staging"
        - "vault"
        - "marts"
        - "meta"

sink:
  type: datahub-rest
  config:
    server: http://datahub-gms:8080

[pytest]
pythonpath = . spark/common generators tests
testpaths = tests
markers =
    integration: needs live stack reachable via GENERATOR_IT_* env vars
    etl_raw: OLAP/DWH raw layer checks (set ETL_OLAP_DSN)
    etl_staging: staging layer after Spark (set ETL_OLAP_DSN)
    etl_marts: dwh_marts presence (set ETL_OLAP_DSN)
addopts = -ra

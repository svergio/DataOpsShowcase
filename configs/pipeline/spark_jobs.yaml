version: 1

privacy:
  salt_env: SPARK_PRIVACY_SALT
  env_arg: production

defaults:
  conn_id: spark_default
  wait_for_termination: true
  verbose: false
  java_package: "org.postgresql:postgresql:42.7.3"

jobs:
  preprocess_orders_payments:
    application: /opt/airflow/spark/jobs/preprocess_orders_payments.py
    py_files:
      - /opt/airflow/spark/common/lib_runtime.py
      - /opt/airflow/spark/common/spark_session.py
      - /opt/airflow/spark/common/privacy_spark.py
    name: dataops_preprocess_orders_payments
    executor_cores: 2
    executor_memory: 1g
    driver_memory: 1g
    num_executors: 1
    retries: 3
    retry_delay_minutes: 5
    anonymize:
      customers:
        natural_key_columns: [customer_id, email, full_name]
        hash_column: customer_hash
        mask_email_source: email
        mask_name_source: full_name

  ml_train_order_value:
    application: /opt/airflow/ml/training/train_order_value_model.py
    py_files:
      - /opt/airflow/spark/common/lib_runtime.py
      - /opt/airflow/spark/common/spark_session.py
      - /opt/airflow/spark/common/privacy_spark.py
    name: dataops_ml_train_order_value
    executor_cores: 2
    executor_memory: 2g
    driver_memory: 1g
    num_executors: 1
    retries: 2
    retry_delay_minutes: 5

  analytics_summary:
    application: /opt/airflow/spark/jobs/analytics_summary.py
    py_files:
      - /opt/airflow/spark/common/lib_runtime.py
      - /opt/airflow/spark/common/spark_session.py
    name: dataops_spark_analytics_summary
    executor_cores: 2
    executor_memory: 1g
    driver_memory: 1g
    num_executors: 1
    retries: 2
    retry_delay_minutes: 5

  pg_finance_cbr_demo:
    application: /opt/airflow/spark/jobs/pg_finance_cbr_demo.py
    py_files:
      - /opt/airflow/spark/common/lib_runtime.py
      - /opt/airflow/spark/common/spark_session.py
    name: dataops_pg_finance_cbr_demo
    executor_cores: 2
    executor_memory: 1g
    driver_memory: 1g
    num_executors: 1
    retries: 2
    retry_delay_minutes: 5
